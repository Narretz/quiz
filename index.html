<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz XLSX to PPTX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    h1 { margin-bottom: 1rem; }
    .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    button, label.upload-btn {
      padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.9rem; background: #2563eb; color: #fff;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:hover:not(:disabled), label.upload-btn:hover { background: #1d4ed8; }
    label.upload-btn { display: inline-block; }
    label.upload-btn input { display: none; }
    .status { font-size: 0.85rem; color: #666; }
    .style-controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; font-size: 0.85rem; }
    .style-controls label { display: flex; align-items: center; gap: 0.3rem; }
    .style-controls input[type="number"] { width: 4rem; padding: 0.25rem 0.4rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.85rem; }
    .preview { display: flex; flex-wrap: wrap; gap: 1rem; }
    .slide {
      width: 576px; height: 324px; background: #fff; border: 1px solid #ccc;
      border-radius: 4px; position: relative; overflow: hidden;
      line-height: 1.3; flex-shrink: 0;
    }
    .slide.title-slide {
      display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .slide .title-text { font-weight: bold; }
    .slide .img-actions {
      position: absolute; top: 4px; right: 4px;
      display: none; gap: 3px; z-index: 2;
    }
    .slide:hover .img-actions { display: flex; }
    .slide .img-actions button {
      padding: 2px 6px; font-size: 12px; border-radius: 3px;
      background: rgba(0,0,0,0.55); color: #fff; border: none; cursor: pointer;
    }
    .slide .img-actions button:hover { background: rgba(0,0,0,0.8); }
    .slide .img-actions input { display: none; }
    .section-label {
      width: 100%; font-size: 0.75rem; color: #999; text-transform: uppercase;
      letter-spacing: 0.05em; margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Quiz XLSX to PPTX</h1>
  <div class="controls">
    <label class="upload-btn">
      Upload .xlsx
      <input type="file" id="fileInput" accept=".xlsx">
    </label>
    <button id="downloadBtn" disabled>Download .pptx</button>
    <span class="status" id="status"></span>
  </div>
  <div class="style-controls">
    <label>Font size <input type="number" id="fontSizeInput" min="8" max="48" step="1"></label>
    <label>Line spacing % <input type="number" id="lineSpacingInput" min="80" max="200" step="5"></label>
  </div>
  <div class="preview" id="preview"></div>

  <script src="https://cdn.jsdelivr.net/npm/officeparser@6.0.7/dist/officeparser.browser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@4.0.1/dist/pptxgen.bundle.js"></script>
  <script type="module">
    import { astToQuiz, buildPptx, buildSlideDescriptors, SLIDE_STYLE, computeImageLayout } from "./quiz-core.js";

    const PREVIEW_WIDTH = 576; // px — must match CSS .slide width
    const PT_SCALE = PREVIEW_WIDTH / (SLIDE_STYLE.width * 72); // pt → px
    const PX = PREVIEW_WIDTH / SLIDE_STYLE.width; // inches → preview px
    const px = (v) => Math.round(v * PX) + "px";

    const fileInput = document.getElementById("fileInput");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const previewEl = document.getElementById("preview");
    const fontSizeInput = document.getElementById("fontSizeInput");
    const lineSpacingInput = document.getElementById("lineSpacingInput");
    let currentQuiz = null;

    // Initialise inputs from current SLIDE_STYLE values
    fontSizeInput.value = SLIDE_STYLE.question.fontSize;
    lineSpacingInput.value = SLIDE_STYLE.question.lineSpacing;

    function onStyleChange() {
      SLIDE_STYLE.question.fontSize = Number(fontSizeInput.value);
      SLIDE_STYLE.question.lineSpacing = Number(lineSpacingInput.value);
      if (currentQuiz) renderPreview(currentQuiz);
    }
    fontSizeInput.addEventListener("input", onStyleChange);
    lineSpacingInput.addEventListener("input", onStyleChange);

    // Image store: slide ID -> { data, width, height }
    const slideImages = {};

    function esc(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function formatAnswer(q) {
      return q.answers.de === q.answers.en
        ? q.answers.de
        : `${q.answers.de} / ${q.answers.en}`;
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function loadImageDimensions(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
        img.src = dataUrl;
      });
    }

    function renderPreview(quiz) {
      previewEl.innerHTML = "";
      const descriptors = buildSlideDescriptors(quiz);

      // Group into sections for labels
      const sections = [
        { label: "", indices: [0] },  // date
      ];
      const roundSlices = [
        quiz.rounds.slice(0, 2),
        quiz.rounds.slice(2, 5),
        quiz.rounds.slice(5),
      ];

      let idx = 1; // skip date
      for (let s = 0; s < roundSlices.length; s++) {
        const sec = { label: `Section ${s + 1}`, indices: [] };
        const rounds = roundSlices[s];
        // Questions pass
        for (const r of rounds) {
          sec.indices.push(idx++); // round title
          const count = r.questions.length === 0 ? 10 : r.questions.length;
          for (let i = 0; i < count; i++) sec.indices.push(idx++);
        }
        sec.indices.push(idx++); // Break
        sec.indices.push(idx++); // Answers
        // Answers pass
        for (const r of rounds) {
          sec.indices.push(idx++); // round title
          const count = r.questions.length === 0 ? 10 : r.questions.length;
          for (let i = 0; i < count; i++) sec.indices.push(idx++);
        }
        sections.push(sec);
      }

      let descIdx = 0;
      for (const sec of sections) {
        if (sec.label) {
          const labelDiv = document.createElement("div");
          labelDiv.className = "section-label";
          labelDiv.textContent = sec.label;
          previewEl.appendChild(labelDiv);
        }

        for (const i of sec.indices) {
          const desc = descriptors[i];
          if (!desc) continue;
          const div = document.createElement("div");

          if (desc.type === "title") {
            div.className = "slide title-slide";
            div.innerHTML = `<span class="title-text" style="font-size:${SLIDE_STYLE.title.fontSize * PT_SCALE}px">${esc(desc.text)}</span>`;
          } else {
            const { q, num, withAnswers, id } = desc;
            const imgEntry = id && slideImages[id];
            const { pad } = SLIDE_STYLE;
            const fullW = SLIDE_STYLE.width - 2 * pad;
            div.className = "slide";
            if (id) {
              div.dataset.slideId = id;
              div.dataset.answers = withAnswers ? "1" : "0";
            }

            let deW = fullW, enW = fullW, answerW = fullW;
            let imgHtml = "";

            if (imgEntry) {
              const layout = computeImageLayout(imgEntry.width / imgEntry.height);
              deW = layout.deW;
              enW = layout.enW;
              answerW = layout.answerW;
              const { img } = layout;
              imgHtml = `<img src="${imgEntry.data}" style="position:absolute;left:${px(img.x)};top:${px(img.y)};width:${px(img.w)};height:${px(img.h)};object-fit:contain">`;
            }

            const qFs = SLIDE_STYLE.question.fontSize * PT_SCALE;
            const qLh = SLIDE_STYLE.question.lineSpacing / 100;
            const numFs = SLIDE_STYLE.num.fontSize * PT_SCALE;
            let html = "";

            if (q) {
              html += `<div style="position:absolute;left:${px(pad)};top:${px(pad)};width:${px(deW)};font-size:${qFs}px;line-height:${qLh}">`;
              html += `<span style="font-size:${numFs}px;font-weight:bold">${num}</span> ${esc(q.text.de)}`;
              html += `</div>`;
              if (q.text.en) {
                html += `<div style="position:absolute;left:${px(pad)};top:${px(2.5)};width:${px(enW)};font-size:${qFs}px;line-height:${qLh}">`;
                html += esc(q.text.en);
                html += `</div>`;
              }
              if (withAnswers) {
                html += `<div style="position:absolute;left:0;bottom:0;width:100%;font-size:${SLIDE_STYLE.answer.fontSize * PT_SCALE}px;font-weight:bold;text-align:center;background:#CC0000;color:#fff;padding:4px 0;z-index:1">`;
                html += esc(formatAnswer(q));
                html += `</div>`;
              }
            } else {
              html += `<div style="position:absolute;left:${px(pad)};top:${px(pad)};font-size:${numFs}px;font-weight:bold">${num}</div>`;
            }

            html += imgHtml;

            if (id) {
              html += `<div class="img-actions">`;
              html += `<button class="nav-btn" data-nav-id="${id}" data-nav-target="${withAnswers ? "0" : "1"}">${withAnswers ? "\u2191 question" : "\u2193 answer"}</button>`;
              html += `<label><button class="add-img-btn" type="button">+img</button><input type="file" accept="image/*" data-slide-id="${id}"></label>`;
              if (slideImages[id]) {
                html += `<button class="rm-img-btn" data-slide-id="${id}">x</button>`;
              }
              html += `</div>`;
            }

            div.innerHTML = html;
          }
          previewEl.appendChild(div);
        }
      }

      // Wire up image add buttons (trigger hidden file input)
      previewEl.querySelectorAll(".add-img-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          btn.parentElement.querySelector("input").click();
        });
      });

      // Wire up file inputs
      previewEl.querySelectorAll('.img-actions input[type="file"]').forEach((input) => {
        input.addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const dataUrl = await readFileAsDataURL(file);
          const dims = await loadImageDimensions(dataUrl);
          slideImages[input.dataset.slideId] = { data: dataUrl, ...dims };
          renderPreview(quiz);
        });
      });

      // Wire up remove buttons
      previewEl.querySelectorAll(".rm-img-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          delete slideImages[btn.dataset.slideId];
          renderPreview(quiz);
        });
      });

      // Wire up nav buttons (go to answer / go to question)
      previewEl.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const target = previewEl.querySelector(
            `.slide[data-slide-id="${btn.dataset.navId}"][data-answers="${btn.dataset.navTarget}"]`
          );
          if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
        });
      });
    }

    // --- Event handlers ---

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      statusEl.textContent = "Parsing...";
      downloadBtn.disabled = true;
      try {
        const buffer = await file.arrayBuffer();
        const ast = await officeParser.OfficeParser.parseOffice(buffer);
        currentQuiz = astToQuiz(ast);
        // Clear images from previous upload
        for (const k of Object.keys(slideImages)) delete slideImages[k];
        renderPreview(currentQuiz);
        downloadBtn.disabled = false;
        statusEl.textContent =
          `${currentQuiz.rounds.length} rounds, ${currentQuiz.date}`;
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        console.error(err);
      }
    });

    downloadBtn.addEventListener("click", async () => {
      if (!currentQuiz) return;
      statusEl.textContent = "Generating PPTX...";
      try {
        const pptx = buildPptx(currentQuiz, PptxGenJS, slideImages);
        await pptx.writeFile({ fileName: `quiz-${currentQuiz.date}.pptx` });
        statusEl.textContent = "Downloaded!";
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
