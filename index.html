<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz XLSX to PPTX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    h1 { margin-bottom: 1rem; }
    .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .saved-quizzes { margin-bottom: 1rem; font-size: 0.85rem; }
    .saved-quizzes:empty { display: none; }
    .saved-quizzes .sq-item {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.6rem; margin: 0.2rem; border-radius: 4px;
      background: #fff; border: 1px solid #ddd;
    }
    .saved-quizzes .sq-item.active { border-color: #2563eb; border-width: 3px; background: #eff4ff; }
    .saved-quizzes .sq-label { cursor: pointer; }
    .saved-quizzes .sq-label:hover { text-decoration: underline; }
    .saved-quizzes .sq-delete {
      background: none; border: none; color: #999; cursor: pointer;
      font-size: 0.85rem; padding: 0 0.2rem; line-height: 1;
    }
    .saved-quizzes .sq-delete:hover { color: #e00; }
    button, label.upload-btn {
      padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.9rem; background: #2563eb; color: #fff;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:hover:not(:disabled), label.upload-btn:hover { background: #1d4ed8; }
    label.upload-btn { display: inline-block; }
    label.upload-btn input { display: none; }
    .status { font-size: 0.85rem; color: #666; }
    .toc { display: flex; gap: 0.3rem; flex-wrap: wrap; font-size: 0.8rem; }
    .toc:empty { display: none; }
    .toc a {
      color: #2563eb; text-decoration: none; padding: 0.2rem 0.5rem;
      border-radius: 3px; white-space: nowrap;
    }
    .toc a:hover { background: #e0e7ff; }
    .toc .toc-sep { color: #ccc; align-self: center; }
    .style-controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; font-size: 0.85rem; }
    .style-controls label { display: flex; align-items: center; gap: 0.3rem; }
    .style-controls input[type="number"] { width: 4rem; padding: 0.25rem 0.4rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.85rem; }
    .preview { display: flex; flex-wrap: wrap; gap: 1rem; }
    .slide {
      width: 576px; height: 324px; border: 1px solid #ccc;
      border-radius: 4px; position: relative; overflow: hidden;
      line-height: 1.3; flex-shrink: 0;
    }
    .slide.title-slide {
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    .slide .title-text { font-weight: bold; }
    .slide .img-actions {
      position: absolute; top: 4px; right: 4px;
      display: none; gap: 3px; z-index: 2;
      font-size: 12px;
    }
    .slide:hover .img-actions { display: flex; }
    .slide .img-actions button {
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(0,0,0,0.55); color: #fff; border: none; cursor: pointer;
    }
    .slide .img-actions button:hover { background: rgba(0,0,0,0.8); }
    .slide .img-actions input[type="file"] { display: none; }
    .slide .img-actions label.override-label {
      display: flex; align-items: center; gap: 2px;
      color: #fff; white-space: nowrap;
      border-radius: 3px;
      background: rgba(0,0,0,0.55); border: none;
      font-size: inherit;
    }
    .slide .img-actions input[type="number"] {
      width: 3rem; padding: 1px 3px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.55); color: #fff;
      font-size: inherit;
    }
    .section-label {
      width: 100%; font-size: 0.75rem; color: #999; text-transform: uppercase;
      letter-spacing: 0.05em; margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Quiz XLSX to PPTX</h1>
  <div class="controls">
    <label class="upload-btn">
      Upload .xlsx
      <input type="file" id="fileInput" accept=".xlsx">
    </label>
    Stored quizzes:<div id="savedQuizzes" class="saved-quizzes"></div>
  </div>
  <div class="controls">
    <button id="downloadBtn" disabled>Download .pptx</button>
    <span class="status" id="status"></span>
    <button id="deleteQuizBtn" style="display:none;margin-left:auto;background:#dc2626" >Delete quiz</button>
    <nav id="toc" class="toc"></nav>
  </div>
  <div class="style-controls">
    <label>Font size <input type="number" id="fontSizeInput" min="8" max="48" step="1"></label>
    <label>Line spacing % <input type="number" id="lineSpacingInput" min="80" max="200" step="5"></label>
    <label>Background <input type="color" id="bgColorInput"></label>
  </div>
  <div class="preview" id="preview"></div>

  <script src="https://cdn.jsdelivr.net/npm/officeparser@6.0.7/dist/officeparser.browser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@4.0.1/dist/pptxgen.bundle.js"></script>
  <script type="module">
    import { astToQuiz, buildPptx, buildSlideDescriptors, SLIDE_STYLE, computeImageLayout, fit, formatAnswer } from "./quiz-core.js";

    const PREVIEW_WIDTH = 576; // px — must match CSS .slide width
    const PT_SCALE = PREVIEW_WIDTH / (SLIDE_STYLE.width * 72); // pt → px
    const PX = PREVIEW_WIDTH / SLIDE_STYLE.width; // inches → preview px
    const px = (v) => Math.round(v * PX) + "px";

    const fileInput = document.getElementById("fileInput");
    const downloadBtn = document.getElementById("downloadBtn");
    const deleteQuizBtn = document.getElementById("deleteQuizBtn");
    const statusEl = document.getElementById("status");
    const previewEl = document.getElementById("preview");
    const fontSizeInput = document.getElementById("fontSizeInput");
    const lineSpacingInput = document.getElementById("lineSpacingInput");
    const bgColorInput = document.getElementById("bgColorInput");
    const savedQuizzesEl = document.getElementById("savedQuizzes");
    let currentQuiz = null;
    let currentQuizId = null;

    // --- IndexedDB helpers ---
    const DB_NAME = "quiz-app", STORE = "quizzes";
    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE, { keyPath: "id" });
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function dbPut(data) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put(data);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }
    async function dbGet(id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, "readonly").objectStore(STORE).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function dbDelete(id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }
    async function dbList() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    // --- Save / load / list ---
    let persistRequested = false;
    let saveTimeout = null;
    function scheduleSave() {
      if (!currentQuiz || !currentQuizId) return;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        if (!persistRequested) {
          persistRequested = true;
          navigator.storage?.persist?.();
        }
        await dbPut({
          id: currentQuizId,
          quiz: currentQuiz,
          images: { ...slideImages },
          manualOverrides: { ...manualOverrides },
          style: { fontSize: SLIDE_STYLE.question.fontSize, lineSpacing: SLIDE_STYLE.question.lineSpacing, backgroundColor: SLIDE_STYLE.backgroundColor },
          savedAt: Date.now(),
        });
        renderSavedList();
      }, 300);
    }

    async function loadSavedQuiz(id) {
      const saved = await dbGet(id);
      if (!saved) return;
      currentQuiz = saved.quiz;
      currentQuizId = id;
      // Restore images
      for (const k of Object.keys(slideImages)) delete slideImages[k];
      Object.assign(slideImages, saved.images || {});
      // Restore manual overrides
      for (const k of Object.keys(manualOverrides)) delete manualOverrides[k];
      Object.assign(manualOverrides, saved.manualOverrides || {});
      // Restore style
      if (saved.style) {
        SLIDE_STYLE.question.fontSize = saved.style.fontSize;
        SLIDE_STYLE.question.lineSpacing = saved.style.lineSpacing;
        SLIDE_STYLE.backgroundColor = saved.style.backgroundColor || "#FFFFFF";
        fontSizeInput.value = saved.style.fontSize;
        lineSpacingInput.value = saved.style.lineSpacing;
        bgColorInput.value = SLIDE_STYLE.backgroundColor;
      }
      downloadBtn.disabled = false;
      statusEl.textContent = `${currentQuiz.rounds.length} rounds, ${currentQuiz.date}`;
      renderPreview(currentQuiz);
      updateDeleteBtn();
      renderSavedList();
    }

    deleteQuizBtn.addEventListener("click", () => {
      if (currentQuizId) deleteSavedQuiz(currentQuizId);
    });

    function updateDeleteBtn() {
      deleteQuizBtn.style.display = currentQuizId ? "" : "none";
    }

    async function deleteSavedQuiz(id) {
      if (!confirm(`Delete saved quiz "${id}"?`)) return;
      await dbDelete(id);
      if (currentQuizId === id) {
        currentQuiz = null;
        currentQuizId = null;
        for (const k of Object.keys(slideImages)) delete slideImages[k];
        for (const k of Object.keys(manualOverrides)) delete manualOverrides[k];
        previewEl.innerHTML = "";
        document.getElementById("toc").innerHTML = "";
        downloadBtn.disabled = true;
        statusEl.textContent = "";
      }
      updateDeleteBtn();
      renderSavedList();
    }

    async function renderSavedList() {
      const list = await dbList();
      savedQuizzesEl.innerHTML = "";
      if (list.length === 0) return;
      for (const entry of list.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0))) {
        const isActive = entry.id === currentQuizId;
        const item = document.createElement("span");
        item.className = "sq-item" + (isActive ? " active" : "");
        const label = document.createElement("span");
        label.className = "sq-label";
        label.textContent = entry.id;
        label.addEventListener("click", () => loadSavedQuiz(entry.id));
        item.appendChild(label);
        savedQuizzesEl.appendChild(item);
      }
    }
    renderSavedList();

    // Reset state on load (Firefox restores form element states across reloads)
    downloadBtn.disabled = true;
    // Initialise inputs from current SLIDE_STYLE values
    fontSizeInput.value = SLIDE_STYLE.question.fontSize;
    lineSpacingInput.value = SLIDE_STYLE.question.lineSpacing;
    bgColorInput.value = SLIDE_STYLE.backgroundColor;

    function onStyleChange() {
      SLIDE_STYLE.question.fontSize = Number(fontSizeInput.value);
      SLIDE_STYLE.question.lineSpacing = Number(lineSpacingInput.value);
      SLIDE_STYLE.backgroundColor = bgColorInput.value;
      if (currentQuiz) renderPreview(currentQuiz);
      scheduleSave();
    }
    fontSizeInput.addEventListener("input", onStyleChange);
    lineSpacingInput.addEventListener("input", onStyleChange);
    bgColorInput.addEventListener("input", onStyleChange);

    // Image store: "slideId:0/1" -> { data, width, height, unlinked? }
    const slideImages = {};

    function esc(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function loadImageDimensions(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
        img.src = dataUrl;
      });
    }

    // Per-slide overrides computed by the fitting pass: "id:0/1" -> {fontSize, lineSpacing, enY}
    const slideOverrides = {};
    // Manual per-slide overrides set via inputs: "id:0/1" -> {fontSize, lineSpacing}
    const manualOverrides = {};

    function fitSlideText(slideDiv, forceFs, forceLs) {
      const deEl = slideDiv.querySelector('[data-role="de"]');
      const enEl = slideDiv.querySelector('[data-role="en"]');
      if (!deEl) return null;

      const id = slideDiv.dataset.slideId;
      const isAnswer = slideDiv.dataset.answers === "1";
      const slideKey = `${id}:${isAnswer ? 1 : 0}`;
      const imgEntry = slideImages[slideKey];
      const { pad, height: H } = SLIDE_STYLE;

      // Bottom limit: answer bar, image, or slide edge
      let bottomLimit = H - pad;
      if (isAnswer) bottomLimit = 4.8;
      if (imgEntry) {
        const ar = imgEntry.width / imgEntry.height;
        const layout = computeImageLayout(ar);
        if (layout.mode === "ultrawide") {
          bottomLimit = Math.min(bottomLimit, layout.img.y - pad);
        }
      }

      const baseFs = SLIDE_STYLE.question.fontSize;
      const baseLs = SLIDE_STYLE.question.lineSpacing;
      const minLs = baseLs - 10;
      const { width: W } = SLIDE_STYLE;
      const fullW = W - 2 * pad;

      // Compact layout: if text is short, move landscape image below text for more space
      if (!forceFs && imgEntry && enEl) {
        const ar = imgEntry.width / imgEntry.height;
        const layout = computeImageLayout(ar);
        if (layout.mode === "landscape") {
          // Measure at full width with default font settings
          const fsPx = baseFs * PT_SCALE;
          deEl.style.fontSize = fsPx + "px";
          deEl.style.lineHeight = String(baseLs / 100);
          deEl.style.width = px(fullW);
          enEl.style.fontSize = fsPx + "px";
          enEl.style.lineHeight = String(baseLs / 100);
          enEl.style.width = px(fullW);

          const deH = deEl.scrollHeight / PX;
          const enH = enEl.scrollHeight / PX;

          if (deH + enH <= H * 0.4) {
            const enY = pad + deH + pad;
            enEl.style.top = Math.round(enY * PX) + "px";
            const textBottom = enY + enH + pad;
            const imgBoxW = fullW;
            const imgBoxH = (isAnswer ? 4.8 : H - pad) - textBottom;
            const { w: imgW, h: imgH } = fit(imgBoxW, imgBoxH, ar);
            const imgX = (W - imgW) / 2;
            const imgY = textBottom;

            // Update image element in DOM
            const imgEl = slideDiv.querySelector("img");
            if (imgEl) {
              imgEl.style.left = px(imgX);
              imgEl.style.top = px(imgY);
              imgEl.style.width = px(imgW);
              imgEl.style.height = px(imgH);
            }

            return {
              fontSize: baseFs, lineSpacing: baseLs, enY,
              deW: fullW, enW: fullW,
              imgLayout: { x: imgX, y: imgY, w: imgW, h: imgH },
            };
          }

          // Not compact — restore original widths
          deEl.style.width = px(layout.deW);
          enEl.style.width = px(layout.enW);
        }
      }

      // Try a specific fontSize + lineSpacing, reposition EN, return result or null
      function tryFit(fs, ls) {
        const fsPx = fs * PT_SCALE;
        const lh = ls / 100;
        deEl.style.fontSize = fsPx + "px";
        deEl.style.lineHeight = String(lh);
        if (enEl) {
          enEl.style.fontSize = fsPx + "px";
          enEl.style.lineHeight = String(lh);
        }

        const deBottom = pad + deEl.scrollHeight / PX;

        if (!enEl) {
          return deBottom <= bottomLimit ? { fontSize: fs, lineSpacing: ls, enY: 2.5 } : null;
        }

        // 1a: push EN down if DE overlaps default position
        let enY = Math.max(2.5, deBottom + pad);
        enEl.style.top = Math.round(enY * PX) + "px";
        if (enY + enEl.scrollHeight / PX <= bottomLimit) {
          return { fontSize: fs, lineSpacing: ls, enY };
        }

        // 1b: try moving EN up (keep pad gap from DE)
        enY = deBottom + pad;
        enEl.style.top = Math.round(enY * PX) + "px";
        if (enY + enEl.scrollHeight / PX <= bottomLimit) {
          return { fontSize: fs, lineSpacing: ls, enY };
        }

        return null;
      }

      // Manual override: apply forced values, compute enY
      if (forceFs != null) {
        const result = tryFit(forceFs, forceLs);
        if (result) return result;
        // Doesn't fit — still apply and return best-effort enY
        tryFit(forceFs, forceLs);
        const enY = pad + deEl.scrollHeight / PX + pad;
        if (enEl) enEl.style.top = Math.round(enY * PX) + "px";
        return { fontSize: forceFs, lineSpacing: forceLs, enY };
      }

      // For each font size (half-point steps), binary-search the highest line spacing that fits
      for (const fs of [baseFs, baseFs - 0.5, baseFs - 1, baseFs - 1.5, baseFs - 2]) {
        let lo = minLs, hi = baseLs, best = null;
        while (lo <= hi) {
          const mid = Math.round((lo + hi) / 2);
          const result = tryFit(fs, mid);
          if (result) {
            best = result;
            lo = mid + 1; // try higher spacing
          } else {
            hi = mid - 1;
          }
        }
        if (best) return best;
      }

      // Give up — apply smallest settings, return best effort
      const lastFs = Math.max(8, baseFs - 2);
      tryFit(lastFs, minLs);
      const enY = pad + deEl.scrollHeight / PX + pad;
      if (enEl) enEl.style.top = Math.round(enY * PX) + "px";
      return { fontSize: lastFs, lineSpacing: minLs, enY };
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function renderPreview(quiz) {
      previewEl.innerHTML = "";
      const descriptors = buildSlideDescriptors(quiz);

      // Build TOC entries and section structure from quiz rounds
      const tocEl = document.getElementById("toc");
      tocEl.innerHTML = "";
      const tocEntries = []; // { label, anchor }

      // Group into sections for labels
      const sections = [
        { label: "", indices: [0] },  // date
      ];
      const roundSlices = [
        quiz.rounds.slice(0, 2),
        quiz.rounds.slice(2, 5),
        quiz.rounds.slice(5),
      ];

      tocEntries.push({ label: "Intro", anchor: "intro" });

      let idx = 1; // skip date
      for (let s = 0; s < roundSlices.length; s++) {
        const sec = { label: `Section ${s + 1}`, indices: [] };
        const rounds = roundSlices[s];
        // Questions pass
        for (const r of rounds) {
          tocEntries.push({ label: r.name, anchor: slugify(r.name) });
          sec.indices.push(idx++); // round title
          const count = r.questions.length === 0 ? 10 : r.questions.length;
          for (let i = 0; i < count; i++) sec.indices.push(idx++);
        }
        sec.indices.push(idx++); // Antworten
        // Answers pass
        for (const r of rounds) {
          tocEntries.push({ label: `${r.name} Answers`, anchor: slugify(r.name) + "-answers" });
          sec.indices.push(idx++); // round title
          const count = r.questions.length === 0 ? 10 : r.questions.length;
          for (let i = 0; i < count; i++) sec.indices.push(idx++);
        }
        if (s < roundSlices.length - 1) {
          tocEntries.push({ label: `Break ${s + 1}`, anchor: `break-${s + 1}` });
          sec.indices.push(idx++); // Pause
        }
        sections.push(sec);
      }

      // Render TOC
      tocEntries.forEach((e, i) => {
        if (i > 0) {
          const sep = document.createElement("span");
          sep.className = "toc-sep";
          sep.textContent = "|";
          tocEl.appendChild(sep);
        }
        const a = document.createElement("a");
        a.href = `#${e.anchor}`;
        a.textContent = e.label;
        a.addEventListener("click", (ev) => {
          ev.preventDefault();
          const target = document.getElementById(e.anchor);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
            history.replaceState(null, "", `#${e.anchor}`);
          }
        });
        tocEl.appendChild(a);
      });

      // Track which title slides get anchors
      let tocIdx = 0;
      // First entry is "Intro" for the date slide (index 0)

      const roundNames = new Set(quiz.rounds.map(r => r.name));

      let descIdx = 0;
      for (const sec of sections) {
        if (sec.label) {
          const labelDiv = document.createElement("div");
          labelDiv.className = "section-label";
          labelDiv.textContent = sec.label;
          previewEl.appendChild(labelDiv);
        }

        for (const i of sec.indices) {
          const desc = descriptors[i];
          if (!desc) continue;
          const div = document.createElement("div");

          if (desc.type === "title" && roundNames.has(desc.text)) {
            // Force round titles onto a new flex line
            const br = document.createElement("div");
            br.style.cssText = "flex-basis:100%;height:0";
            previewEl.appendChild(br);
          }

          if (desc.type === "title") {
            div.className = "slide title-slide";
            div.style.backgroundColor = SLIDE_STYLE.backgroundColor;
            // Assign anchor ID to title slides (skip "Answers" divider slides)
            if (tocIdx < tocEntries.length && !desc.text.startsWith("Antworten")) {
              div.id = tocEntries[tocIdx].anchor;
              tocIdx++;
            }
            let titleHtml = `<span class="title-text" style="font-size:${SLIDE_STYLE.title.fontSize * PT_SCALE}px">${esc(desc.text)}</span>`;
            if (desc.subtitle) {
              titleHtml += `<div style="margin-top:12px;font-size:${SLIDE_STYLE.question.fontSize * PT_SCALE}px;white-space:pre-line">${esc(desc.subtitle)}</div>`;
            }
            div.innerHTML = titleHtml;
          } else {
            const { q, num, withAnswers, id } = desc;
            const slideKey = id ? `${id}:${withAnswers ? 1 : 0}` : null;
            const imgEntry = slideKey && slideImages[slideKey];
            const { pad } = SLIDE_STYLE;
            const fullW = SLIDE_STYLE.width - 2 * pad;
            div.className = "slide";
            div.style.backgroundColor = SLIDE_STYLE.backgroundColor;
            if (id) {
              div.dataset.slideId = id;
              div.dataset.answers = withAnswers ? "1" : "0";
            }

            let deW = fullW, enW = fullW, answerW = fullW;
            let imgHtml = "";

            if (imgEntry && !q) {
              // No text — image fills the slide
              const ar = imgEntry.width / imgEntry.height;
              const W = SLIDE_STYLE.width, H = SLIDE_STYLE.height;
              const boxW = W - 2 * pad, boxH = H - 2 * pad;
              const fitW = ar > boxW / boxH ? boxW : boxH * ar;
              const fitH = ar > boxW / boxH ? boxW / ar : boxH;
              imgHtml = `<img src="${imgEntry.data}" style="position:absolute;left:${px((W - fitW) / 2)};top:${px((H - fitH) / 2)};width:${px(fitW)};height:${px(fitH)};object-fit:contain">`;
            } else if (imgEntry) {
              const layout = computeImageLayout(imgEntry.width / imgEntry.height);
              deW = layout.deW;
              enW = layout.enW;
              answerW = layout.answerW;
              const { img } = layout;
              imgHtml = `<img src="${imgEntry.data}" style="position:absolute;left:${px(img.x)};top:${px(img.y)};width:${px(img.w)};height:${px(img.h)};object-fit:contain">`;
            }

            const qFs = SLIDE_STYLE.question.fontSize * PT_SCALE;
            const qLh = SLIDE_STYLE.question.lineSpacing / 100;
            const numFs = SLIDE_STYLE.num.fontSize * PT_SCALE;
            let html = "";

            if (q) {
              html += `<div data-role="de" style="position:absolute;left:${px(pad)};top:${px(pad)};width:${px(deW)};font-size:${qFs}px;line-height:${qLh}">`;
              html += `<span style="font-size:${numFs}px;font-weight:bold">${num}</span> ${esc(q.text.de)}`;
              html += `</div>`;
              if (q.text.en) {
                html += `<div data-role="en" style="position:absolute;left:${px(pad)};top:${px(2.5)};width:${px(enW)};font-size:${qFs}px;line-height:${qLh}">`;
                html += esc(q.text.en);
                html += `</div>`;
              }
              if (withAnswers) {
                html += `<div style="position:absolute;left:0;bottom:0;width:100%;font-size:${SLIDE_STYLE.answer.fontSize * PT_SCALE}px;font-weight:bold;text-align:center;background:${SLIDE_STYLE.answer.backgroundColor};color:${SLIDE_STYLE.answer.color};padding:4px 0;z-index:1">`;
                html += esc(formatAnswer(q));
                html += `</div>`;
              }
            } else {
              html += `<div style="position:absolute;left:${px(pad)};top:${px(pad)};font-size:${numFs}px;font-weight:bold">${num}</div>`;
            }

            if (withAnswers) {
              html += `<svg style="position:absolute;top:0;left:0;z-index:1" width="30" height="30" viewBox="0 0 30 30"><polygon points="0,0 27,0 0,27" fill="${SLIDE_STYLE.answer.backgroundColor}"/><text x="4" y="12" fill="${SLIDE_STYLE.answer.color}" font-size="10" font-weight="bold">A</text></svg>`;
            }

            html += imgHtml;

            if (id) {
              const key = `${id}:${withAnswers ? 1 : 0}`;
              html += `<div class="img-actions">`;
              html += `<button class="nav-btn" data-nav-id="${id}" data-nav-target="${withAnswers ? "0" : "1"}">${withAnswers ? "\u2191 question" : "\u2193 answer"}</button>`;
              if (imgEntry) {
                html += `<label class="override-label"><input type="number" class="slide-fs-input" data-key="${key}" step="0.5" title="Font size (pt)">pt</label>`;
                html += `<label class="override-label"><input type="number" class="slide-ls-input" data-key="${key}" step="1" title="Line spacing %">%</label>`;
              }
              if (withAnswers && !imgEntry && slideImages[`${id}:0`]) {
                html += `<button class="relink-btn" data-slide-key="${key}" data-id="${id}">relink img from question</button>`;
              }
              if (withAnswers && imgEntry && slideImages[`${id}:0`]?.data === imgEntry.data) {
                html += `<button class="unlink-btn" data-slide-key="${key}" data-id="${id}">unlink img from question</button>`;
              }
              html += `<label><button class="add-img-btn" type="button">+img</button><input type="file" accept="image/*" data-slide-key="${key}" data-id="${id}" data-answers="${withAnswers ? 1 : 0}"></label>`;
              if (imgEntry) {
                html += `<button class="rm-img-btn" data-slide-key="${key}" data-id="${id}" data-answers="${withAnswers ? 1 : 0}">remove img</button>`;
              }
              // Question slide: notify that image was also added to answer
              if (!withAnswers && imgEntry && slideImages[`${id}:1`]?.data === imgEntry.data) {
                html += `<button class="unlink-btn" data-slide-key="${id}:1" data-id="${id}">remove img from answer</button>`;
              }
              html += `</div>`;
            }

            div.innerHTML = html;
          }
          previewEl.appendChild(div);
        }
      }

      // Run text fitting pass on slides with images
      for (const k of Object.keys(slideOverrides)) delete slideOverrides[k];
      previewEl.querySelectorAll(".slide[data-slide-id]").forEach((slideDiv) => {
        const key = `${slideDiv.dataset.slideId}:${slideDiv.dataset.answers}`;
        if (!slideImages[key]) return;
        const manual = manualOverrides[key];
        const result = manual
          ? fitSlideText(slideDiv, manual.fontSize, manual.lineSpacing)
          : fitSlideText(slideDiv);
        if (result) slideOverrides[key] = result;
      });

      // Populate per-slide override inputs with effective values
      previewEl.querySelectorAll(".slide-fs-input").forEach((input) => {
        const o = slideOverrides[input.dataset.key];
        input.value = o?.fontSize ?? SLIDE_STYLE.question.fontSize;
      });
      previewEl.querySelectorAll(".slide-ls-input").forEach((input) => {
        const o = slideOverrides[input.dataset.key];
        input.value = o?.lineSpacing ?? SLIDE_STYLE.question.lineSpacing;
      });

      // Wire up image add buttons (trigger hidden file input)
      previewEl.querySelectorAll(".add-img-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          btn.parentElement.querySelector("input").click();
        });
      });

      // Wire up file inputs
      previewEl.querySelectorAll('.img-actions input[type="file"]').forEach((input) => {
        input.addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const dataUrl = await readFileAsDataURL(file);
          const dims = await loadImageDimensions(dataUrl);
          const imgData = { data: dataUrl, ...dims };
          const key = input.dataset.slideKey;
          const id = input.dataset.id;
          const isAnswer = input.dataset.answers === "1";
          if (isAnswer) {
            slideImages[key] = imgData;
          } else {
            const oldQ = slideImages[key];
            slideImages[key] = imgData;
            // Copy to answer if it was empty or had the same image as the old question
            const ansKey = `${id}:1`;
            const ansImg = slideImages[ansKey];
            if (!ansImg || ansImg.data === oldQ?.data) {
              slideImages[ansKey] = { ...imgData };
            }
          }
          renderPreview(quiz);
          scheduleSave();
        });
      });

      // Wire up remove buttons
      previewEl.querySelectorAll(".rm-img-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.slideKey;
          const id = btn.dataset.id;
          const isAnswer = btn.dataset.answers === "1";
          const ansKey = `${id}:1`;
          const qKey = `${id}:0`;
          const linked = slideImages[qKey] && slideImages[ansKey]
            && slideImages[qKey].data === slideImages[ansKey].data;
          if (linked) {
            delete slideImages[qKey];
            delete slideImages[ansKey];
          } else {
            delete slideImages[key];
          }
          renderPreview(quiz);
          scheduleSave();
        });
      });

      // Wire up unlink buttons
      previewEl.querySelectorAll(".unlink-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          delete slideImages[btn.dataset.slideKey];
          renderPreview(quiz);
          scheduleSave();
        });
      });

      // Wire up relink buttons
      previewEl.querySelectorAll(".relink-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const qImg = slideImages[`${id}:0`];
          if (qImg) {
            slideImages[`${id}:1`] = { ...qImg };
          } else {
            delete slideImages[`${id}:1`];
          }
          renderPreview(quiz);
          scheduleSave();
        });
      });

      // Wire up nav buttons (go to answer / go to question)
      previewEl.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const target = previewEl.querySelector(
            `.slide[data-slide-id="${btn.dataset.navId}"][data-answers="${btn.dataset.navTarget}"]`
          );
          if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
        });
      });

      // Wire up per-slide override inputs
      previewEl.querySelectorAll(".slide-fs-input, .slide-ls-input").forEach((input) => {
        input.addEventListener("change", () => {
          const key = input.dataset.key;
          const fsInput = previewEl.querySelector(`.slide-fs-input[data-key="${key}"]`);
          const lsInput = previewEl.querySelector(`.slide-ls-input[data-key="${key}"]`);
          manualOverrides[key] = {
            fontSize: Number(fsInput.value),
            lineSpacing: Number(lsInput.value),
          };
          renderPreview(quiz);
          scheduleSave();
        });
      });

      // Scroll to hash anchor only on first render
      if (location.hash && !renderPreview._hasRendered) {
        const target = document.getElementById(location.hash.slice(1));
        if (target) target.scrollIntoView({ block: "start" });
      }
      renderPreview._hasRendered = true;
    }

    // --- Event handlers ---

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      statusEl.textContent = "Parsing...";
      downloadBtn.disabled = true;
      try {
        const buffer = await file.arrayBuffer();
        const ast = await officeParser.OfficeParser.parseOffice(buffer);
        currentQuiz = astToQuiz(ast);
        // Pick a unique ID based on quiz date
        let id = currentQuiz.date || `quiz-${Date.now()}`;
        if (await dbGet(id)) {
          let n = 2;
          while (await dbGet(`${id} (${n})`)) n++;
          id = `${id} (${n})`;
        }
        currentQuizId = id;
        // Clear images and manual overrides from previous upload
        for (const k of Object.keys(slideImages)) delete slideImages[k];
        for (const k of Object.keys(manualOverrides)) delete manualOverrides[k];
        renderPreview(currentQuiz);
        downloadBtn.disabled = false;
        statusEl.textContent =
          `${currentQuiz.rounds.length} rounds, ${currentQuiz.date}`;
        updateDeleteBtn();
        scheduleSave();
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        console.error(err);
      }
    });

    downloadBtn.addEventListener("click", async () => {
      if (!currentQuiz) return;
      statusEl.textContent = "Generating PPTX...";
      try {
        const pptx = buildPptx(currentQuiz, PptxGenJS, slideImages, slideOverrides);
        await pptx.writeFile({ fileName: `quiz-${currentQuiz.date}.pptx` });
        statusEl.textContent = "Downloaded!";
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
